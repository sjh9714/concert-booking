spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/concert_booking
    username: concert
    password: concert1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
    open-in-view: false

  sql:
    init:
      mode: never

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:29092
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false
    producer:
      acks: all
      retries: 3

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: concert-booking
  prometheus:
    metrics:
      export:
        enabled: true

reservation:
  strategy: pessimistic  # pessimistic | optimistic | distributed

jwt:
  secret: local-dev-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
  expiration: 3600000
