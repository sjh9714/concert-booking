<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="780" viewBox="0 0 1280 780" role="img" aria-labelledby="title desc">
  <title id="title">Concert Booking overall architecture</title>
  <desc id="desc">Simplified README architecture showing queue token admission, reservation transaction, PostgreSQL truth, Redis pre-check cache, Outbox, Kafka, DLT, admin replay, and reconciliation flow.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#344054" />
    </marker>
    <marker id="fail-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#c01048" />
    </marker>
    <marker id="replay-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#6941c6" />
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .zone { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.4; }
      .box { fill: #ffffff; stroke: #475467; stroke-width: 1.7; }
      .store { fill: #fefce8; stroke: #854d0e; stroke-width: 1.7; }
      .cache { fill: #ecfdf3; stroke: #067647; stroke-width: 1.7; }
      .event { fill: #eff6ff; stroke: #175cd3; stroke-width: 1.7; }
      .failure { fill: #fff1f3; stroke: #c01048; stroke-width: 1.7; }
      .job { fill: #f5f3ff; stroke: #6941c6; stroke-width: 1.7; }
      .line { fill: none; stroke: #344054; stroke-width: 2; marker-end: url(#arrow); }
      .failLine { fill: none; stroke: #c01048; stroke-width: 2; stroke-dasharray: 7 5; marker-end: url(#fail-arrow); }
      .replayLine { fill: none; stroke: #6941c6; stroke-width: 2; stroke-dasharray: 7 5; marker-end: url(#replay-arrow); }
      .title { font: 700 25px Arial, sans-serif; fill: #101828; }
      .label { font: 700 16px Arial, sans-serif; fill: #101828; }
      .small { font: 400 13px Arial, sans-serif; fill: #344054; }
      .tiny { font: 400 12px Arial, sans-serif; fill: #475467; }
      .zoneLabel { font: 700 14px Arial, sans-serif; fill: #475467; }
      .note { fill: #ffffff; stroke: #d0d5dd; stroke-width: 1.2; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="780" />
  <text class="title" x="48" y="54">Concert Booking 전체 아키텍처</text>
  <text class="small" x="48" y="82">Queue Token → Reservation Tx → PostgreSQL 최종 기준 데이터, Outbox/Kafka 비동기 이벤트, DLT/manual replay/reconciliation 경계</text>

  <rect class="zone" x="40" y="112" width="1200" height="250" rx="14" />
  <text class="zoneLabel" x="62" y="142">Synchronous request / transaction path</text>

  <rect class="zone" x="40" y="394" width="1200" height="190" rx="14" />
  <text class="zoneLabel" x="62" y="424">Asynchronous event path</text>

  <rect class="zone" x="40" y="618" width="1200" height="108" rx="14" />
  <text class="zoneLabel" x="62" y="638">Failure handling and consistency utilities</text>

  <rect class="box" x="72" y="210" width="128" height="72" rx="8" />
  <text class="label" x="136" y="240" text-anchor="middle">Client</text>
  <text class="small" x="136" y="264" text-anchor="middle">web / k6 / admin</text>

  <rect class="box" x="244" y="170" width="150" height="72" rx="8" />
  <text class="label" x="319" y="200" text-anchor="middle">Queue API</text>
  <text class="small" x="319" y="224" text-anchor="middle">enter / token / SSE</text>

  <rect class="cache" x="438" y="162" width="170" height="88" rx="8" />
  <text class="label" x="523" y="194" text-anchor="middle">Redis Queue</text>
  <text class="label" x="523" y="216" text-anchor="middle">/ Token / Stock</text>
  <text class="small" x="523" y="236" text-anchor="middle">admission + pre-check</text>

  <rect class="box" x="244" y="278" width="150" height="72" rx="8" />
  <text class="label" x="319" y="308" text-anchor="middle">Reservation API</text>
  <text class="small" x="319" y="332" text-anchor="middle">queue token required</text>

  <rect class="box" x="438" y="278" width="170" height="72" rx="8" />
  <text class="label" x="523" y="308" text-anchor="middle">Reservation Tx</text>
  <text class="small" x="523" y="332" text-anchor="middle">seat lock + outbox insert</text>

  <rect class="store" x="660" y="222" width="190" height="100" rx="8" />
  <text class="label" x="755" y="254" text-anchor="middle">PostgreSQL</text>
  <text class="small" x="755" y="278" text-anchor="middle">Seat / Reservation / Payment</text>
  <text class="small" x="755" y="300" text-anchor="middle">최종 기준 데이터</text>

  <rect class="box" x="914" y="166" width="148" height="72" rx="8" />
  <text class="label" x="988" y="196" text-anchor="middle">Payment API</text>
  <text class="small" x="988" y="220" text-anchor="middle">confirm + idempotency</text>

  <rect class="job" x="914" y="258" width="180" height="72" rx="8" />
  <text class="label" x="1004" y="288" text-anchor="middle">Expiration Scheduler</text>
  <text class="small" x="1004" y="312" text-anchor="middle">expire pending holds</text>

  <rect class="store" x="438" y="462" width="170" height="84" rx="8" />
  <text class="label" x="523" y="492" text-anchor="middle">Outbox Table</text>
  <text class="small" x="523" y="516" text-anchor="middle">PENDING / RETRYING</text>
  <text class="small" x="523" y="536" text-anchor="middle">DEAD</text>

  <rect class="event" x="660" y="462" width="148" height="76" rx="8" />
  <text class="label" x="734" y="492" text-anchor="middle">Outbox Relay</text>
  <text class="small" x="734" y="516" text-anchor="middle">retry + publish</text>

  <rect class="event" x="860" y="462" width="148" height="76" rx="8" />
  <text class="label" x="934" y="492" text-anchor="middle">Kafka Topic</text>
  <text class="small" x="934" y="516" text-anchor="middle">reservation events</text>

  <rect class="event" x="1060" y="420" width="148" height="76" rx="8" />
  <text class="label" x="1134" y="450" text-anchor="middle">Consumer</text>
  <text class="small" x="1134" y="474" text-anchor="middle">idempotent release</text>

  <rect class="failure" x="1060" y="526" width="148" height="44" rx="8" />
  <text class="label" x="1134" y="554" text-anchor="middle">DLT</text>

  <rect class="failure" x="246" y="648" width="188" height="52" rx="8" />
  <text class="label" x="340" y="670" text-anchor="middle">Admin Replay API</text>
  <text class="small" x="340" y="690" text-anchor="middle">manual DLT replay</text>

  <rect class="job" x="494" y="648" width="216" height="52" rx="8" />
  <text class="label" x="602" y="670" text-anchor="middle">Reconciliation Job</text>
  <text class="small" x="602" y="690" text-anchor="middle">DB 기준 stock 보정</text>

  <rect class="note" x="790" y="638" width="394" height="72" rx="8" />
  <text class="label" x="812" y="666">Boundary note</text>
  <text class="small" x="812" y="690">Simplified implemented flow, not production topology or SLO claim.</text>

  <path class="line" d="M200 236 H220 V206 H244" />
  <path class="line" d="M200 256 H220 V314 H244" />
  <path class="line" d="M394 206 H438" />
  <path class="line" d="M523 250 V278" />
  <path class="line" d="M394 314 H438" />
  <path class="line" d="M608 314 H660" />
  <path class="line" d="M914 202 H882 V252 H850" />
  <path class="line" d="M914 294 H850" />
  <path class="line" d="M523 350 V462" />
  <path class="line" d="M608 500 H660" />
  <path class="line" d="M808 500 H860" />
  <path class="line" d="M1008 500 H1034 V458 H1060" />
  <path class="failLine" d="M1134 496 V526" />
  <path class="replayLine" d="M1060 548 H1030 V574 H340 V648" />
  <path class="replayLine" d="M434 674 H494" />
  <path class="replayLine" d="M602 648 V600 H830 V344 H755 V322" />
</svg>
