<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="780" viewBox="0 0 1280 780" role="img" aria-labelledby="title desc">
  <title id="title">Concert Booking overall architecture</title>
  <desc id="desc">Queue token, reservation transaction, PostgreSQL truth, Redis cache, Outbox, Kafka, DLT, manual replay, and reconciliation flow.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#344054" />
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .zone { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.4; rx: 12; }
      .box { fill: #ffffff; stroke: #475467; stroke-width: 1.6; rx: 8; }
      .store { fill: #fefce8; stroke: #854d0e; stroke-width: 1.6; rx: 8; }
      .cache { fill: #ecfdf3; stroke: #067647; stroke-width: 1.6; rx: 8; }
      .event { fill: #eff6ff; stroke: #175cd3; stroke-width: 1.6; rx: 8; }
      .failure { fill: #fff1f3; stroke: #c01048; stroke-width: 1.6; rx: 8; }
      .job { fill: #f5f3ff; stroke: #6941c6; stroke-width: 1.6; rx: 8; }
      .title { font: 700 24px Arial, sans-serif; fill: #101828; }
      .label { font: 700 16px Arial, sans-serif; fill: #101828; }
      .small { font: 400 13px Arial, sans-serif; fill: #344054; }
      .zone-label { font: 700 14px Arial, sans-serif; fill: #475467; }
      .line { fill: none; stroke: #344054; stroke-width: 1.8; marker-end: url(#arrow); }
      .dash { fill: none; stroke: #667085; stroke-width: 1.6; stroke-dasharray: 7 5; marker-end: url(#arrow); }
      .note { fill: #f9fafb; stroke: #d0d5dd; stroke-width: 1.2; rx: 8; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="780" />
  <text class="title" x="48" y="52">Concert Booking 전체 아키텍처</text>
  <text class="small" x="48" y="78">Queue Token → Reservation Tx → DB truth, Outbox/Kafka async events, DLT/manual replay/reconciliation failure boundary</text>

  <rect class="zone" x="40" y="110" width="1190" height="230" />
  <text class="zone-label" x="60" y="138">Synchronous request path</text>

  <rect class="zone" x="40" y="370" width="1190" height="220" />
  <text class="zone-label" x="60" y="398">Asynchronous event path</text>

  <rect class="zone" x="40" y="620" width="1190" height="110" />
  <text class="zone-label" x="60" y="648">Failure handling and consistency utilities</text>

  <rect class="box" x="70" y="175" width="130" height="72" />
  <text class="label" x="135" y="207" text-anchor="middle">Client</text>
  <text class="small" x="135" y="228" text-anchor="middle">web / k6 / admin</text>

  <rect class="box" x="250" y="155" width="150" height="72" />
  <text class="label" x="325" y="187" text-anchor="middle">Queue API</text>
  <text class="small" x="325" y="208" text-anchor="middle">enter / token / SSE</text>

  <rect class="cache" x="455" y="145" width="180" height="92" />
  <text class="label" x="545" y="178" text-anchor="middle">Redis Queue</text>
  <text class="label" x="545" y="200" text-anchor="middle">/ Token / Stock</text>
  <text class="small" x="545" y="221" text-anchor="middle">admission + pre-check</text>

  <rect class="box" x="250" y="255" width="150" height="72" />
  <text class="label" x="325" y="287" text-anchor="middle">Reservation API</text>
  <text class="small" x="325" y="308" text-anchor="middle">queue token required</text>

  <rect class="box" x="455" y="260" width="180" height="72" />
  <text class="label" x="545" y="292" text-anchor="middle">Reservation Tx</text>
  <text class="small" x="545" y="313" text-anchor="middle">hold seat + outbox</text>

  <rect class="box" x="705" y="155" width="150" height="72" />
  <text class="label" x="780" y="187" text-anchor="middle">Payment API</text>
  <text class="small" x="780" y="208" text-anchor="middle">confirm + idempotency</text>

  <rect class="job" x="705" y="260" width="180" height="72" />
  <text class="label" x="795" y="292" text-anchor="middle">Expiration Scheduler</text>
  <text class="small" x="795" y="313" text-anchor="middle">expire pending holds</text>

  <rect class="store" x="955" y="175" width="190" height="102" />
  <text class="label" x="1050" y="208" text-anchor="middle">PostgreSQL</text>
  <text class="small" x="1050" y="231" text-anchor="middle">seat / reservation / payment</text>
  <text class="small" x="1050" y="252" text-anchor="middle">DB is source of truth</text>

  <rect class="store" x="455" y="425" width="180" height="72" />
  <text class="label" x="545" y="457" text-anchor="middle">Outbox Table</text>
  <text class="small" x="545" y="478" text-anchor="middle">PENDING / FAILED / DEAD</text>

  <rect class="event" x="705" y="425" width="150" height="72" />
  <text class="label" x="780" y="457" text-anchor="middle">Outbox Relay</text>
  <text class="small" x="780" y="478" text-anchor="middle">retry + backoff</text>

  <rect class="event" x="925" y="425" width="150" height="72" />
  <text class="label" x="1000" y="457" text-anchor="middle">Kafka Topic</text>
  <text class="small" x="1000" y="478" text-anchor="middle">reservation events</text>

  <rect class="event" x="925" y="525" width="150" height="72" />
  <text class="label" x="1000" y="557" text-anchor="middle">Consumer</text>
  <text class="small" x="1000" y="578" text-anchor="middle">idempotent release</text>

  <rect class="failure" x="1120" y="525" width="80" height="72" />
  <text class="label" x="1160" y="557" text-anchor="middle">DLT</text>
  <text class="small" x="1160" y="578" text-anchor="middle">isolate</text>

  <rect class="failure" x="250" y="655" width="170" height="54" />
  <text class="label" x="335" y="678" text-anchor="middle">Admin Replay API</text>
  <text class="small" x="335" y="698" text-anchor="middle">manual DLT replay</text>

  <rect class="job" x="455" y="655" width="190" height="54" />
  <text class="label" x="550" y="678" text-anchor="middle">Reconciliation Job</text>
  <text class="small" x="550" y="698" text-anchor="middle">DB count → Redis stock</text>

  <rect class="note" x="700" y="645" width="455" height="76" />
  <text class="label" x="720" y="672">Boundary note</text>
  <text class="small" x="720" y="694">Simplified structure for implemented core flows and verification scope.</text>
  <text class="small" x="720" y="714">Not a production topology or production SLO claim.</text>

  <path class="line" d="M200 211 H250" />
  <path class="line" d="M400 191 H455" />
  <path class="line" d="M545 237 V260" />
  <path class="line" d="M200 211 C220 260, 220 291, 250 291" />
  <path class="line" d="M400 291 H455" />
  <path class="line" d="M635 296 C730 296, 850 258, 955 236" />
  <path class="line" d="M635 296 C650 250, 665 206, 705 191" />
  <path class="line" d="M855 191 H955" />
  <path class="line" d="M885 296 H955" />
  <path class="line" d="M545 332 V425" />
  <path class="line" d="M635 461 H705" />
  <path class="line" d="M855 461 H925" />
  <path class="line" d="M1000 497 V525" />
  <path class="line" d="M1075 561 H1120" />
  <path class="dash" d="M1120 580 C830 635, 610 647, 420 682" />
  <path class="dash" d="M420 682 C620 610, 760 520, 925 461" />
  <path class="dash" d="M550 655 C635 575, 730 552, 925 561" />
  <path class="dash" d="M550 655 C690 630, 850 285, 955 242" />
  <path class="dash" d="M645 682 C735 640, 860 606, 955 580" />
</svg>
