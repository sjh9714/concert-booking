global:
  scrape_interval: 15s

rule_files:
  - alert-rules.yml

scrape_configs:
  - job_name: concert-booking-local
    metrics_path: /actuator/prometheus
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/.generated/concert-booking.token
    static_configs:
      - targets:
          - host.docker.internal:8080
